site_name: Quantum Memory
site_description: Quantum Memory 技术文档
site_author: quantum_main
site_url: ""

repo_url: ""
edit_uri: edit/main/docs/quantum_memory/docs/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - extra.css

nav:
  - 首页: index.md
  - 写作指南:
    - Mermaid 图表引用: guide/mermaid_include.md
  - ARM:
    - SMMU 架构与设计: arm/smmu/SMMU_Architecture_and_Design.md
    - SMMU SVA 设计: arm/smmu/SMMU_SVA_Design.md
    - SMMU 虚拟化设计: arm/smmu/SMMU_Virtualization_Design.md
    - SMMUv3 多芯异构 SoC 设计: arm/smmu/SMMUv3_MultiDie_Heterogeneous_SoC_Design.md
  - Packages:
    - sort_app: src/packages/sort_app/README.md
    - elog_feature: src/packages/embeded_logging/feature.md
    - elog_design: src/packages/embeded_logging/design.md
    - elog_integration_test_guide: src/packages/embeded_logging/integration_test_guide.md
    - elog_bug: src/packages/embeded_logging/bug.md
    - google_esh_armv8A-64: src/packages/google_esh/examples/emulation/armv8A-64/README.md
  - spec_research:
    - mpam_research: src/spec_research/mpam/MPAM_research.md
    - mpam_ip_req: src/spec_research/mpam/MPAM_SoC_IP_design_requirements.md
    - mpam_registers: src/spec_research/mpam/MPAM_SharedCache_Register_Design.md
    - mpam_soft_design: src/spec_research/mpam/MPAM_Linux_Software_Design.md
    - dmabuf_arch: src/spec_research/dmabuf/DMABUF_ARCHITECTURE.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details

plugins:
  - search:
      lang: zh
